<!doctype html>
<html lang="en-GB">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="Suggested pre-session and post-session emails for Aptem implementation sessions.">
    <title>Aptem implementation email portal</title>
    <link rel="icon" href="data:,">
    <link rel="preconnect" href="https://cdn.jsdelivr.net">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="assets/styles.css" rel="stylesheet">
  </head>
  <body>
    <a class="visually-hidden-focusable skip-link" href="#main-content">Skip to content</a>

    <div class="portal-app">
      <header class="navbar navbar-dark portal-mobile-bar sticky-top d-lg-none">
        <div class="container-fluid">
          <a class="navbar-brand brand-lockup" href="#">
            <span class="brand-mark">aptem.</span>
            <span class="brand-subtitle">Implementation emails</span>
          </a>
          <button class="navbar-toggler" type="button" data-bs-toggle="offcanvas" data-bs-target="#mobile-navigation" aria-controls="mobile-navigation" aria-label="Open navigation">
            <span class="navbar-toggler-icon"></span>
          </button>
        </div>
      </header>

      <div class="container-fluid">
        <div class="row min-vh-100">
          <aside class="portal-sidebar col-lg-4 col-xl-3 col-xxl-2 d-none d-lg-flex flex-column p-0">
            <div class="sidebar-brand">
              <a class="brand-lockup" href="#">
                <span class="brand-mark">aptem.</span>
                <span class="brand-subtitle">Implementation emails</span>
              </a>
            </div>
            <div class="sidebar-search">
              <label class="visually-hidden" for="desktop-search">Search sessions</label>
              <input class="form-control form-control-sm portal-search" id="desktop-search" type="search" placeholder="Search sessions" autocomplete="off">
            </div>
            <nav class="portal-nav flex-grow-1 overflow-auto pb-3" id="desktop-navigation" aria-label="Implementation sessions"></nav>
          </aside>

          <main class="portal-main col-lg-8 col-xl-9 col-xxl-10" id="main-content" tabindex="-1">
            <div class="portal-content">
              <section class="home-view" id="home-view" aria-labelledby="home-title">
                <div class="home-intro">
                  <h1 id="home-title">Implementation email portal</h1>
                  <p>Select a session to view and copy its suggested pre-session and post-session emails.</p>
                </div>
                <div class="home-grid" id="home-grid"></div>
              </section>

              <article class="session-view d-none" id="session-view"></article>
            </div>
          </main>
        </div>
      </div>

      <div class="offcanvas offcanvas-start portal-offcanvas d-lg-none" tabindex="-1" id="mobile-navigation" aria-labelledby="mobile-navigation-title">
        <div class="offcanvas-header">
          <div>
            <p class="brand-mark mb-0">aptem.</p>
            <h2 class="offcanvas-title h6 mb-0" id="mobile-navigation-title">Implementation emails</h2>
          </div>
          <button type="button" class="btn-close btn-close-white" data-bs-dismiss="offcanvas" aria-label="Close navigation"></button>
        </div>
        <div class="offcanvas-body p-0 d-flex flex-column">
          <div class="sidebar-search">
            <label class="visually-hidden" for="mobile-search">Search sessions</label>
            <input class="form-control form-control-sm portal-search" id="mobile-search" type="search" placeholder="Search sessions" autocomplete="off">
          </div>
          <nav class="portal-nav flex-grow-1 overflow-auto pb-3" id="mobile-session-navigation" aria-label="Implementation sessions"></nav>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" defer></script>
    <script src="data/sessions.js" defer></script>
    <script src="assets/app.js" defer></script>
  </body>
</html>
